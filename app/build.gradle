buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.3.2"
    }
}

apply plugin: "com.android.application"

android {
    namespace "com.example.silentai"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.silentai"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}
